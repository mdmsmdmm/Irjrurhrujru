meta:
  environment: python
  toolchain:
    name: pip
    version: 3.11

build:
  requirementsPath: requirements.txt
  script:
    - pip install --upgrade pip
    - pip install -r requirements.txt

run:
  persistenceMount: /data
  containerPort: 8080
  script:
    - python main.py
  ports:
    - port: 8080
      protocol: http